{%- macro quiz_grid(word, questions) -%}
	<h3 class="mt-3">{{ word }}</h3>

	<div style="width: max-content;">
		{%- for i, question in enumerate(questions) -%}
			<div class="mt-2">
				<div class="fw-bolder">{{ question.question }}</div>
				<div class="d-grid justify-content-start" style="grid-template-columns: repeat({{ len(question.options) }}, 1fr)">
					{%- for option in question.options -%}
						<div class="d-flex gap-1">
							<div class="{{ 'bg-success' if word[i] == option.key else 'bg-dark' }} badge rounded border border-1">{{ option.key }}</div>
							<div>{{ option.text }}</div>
						</div>
					{%- endfor -%}
				</div>
			</div>
		{%- endfor -%}
	</div>
{%- endmacro -%}
